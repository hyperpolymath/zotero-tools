# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: MPL-2.0

[project]
name = "rescript-templater"

[[functions]]
name = "mountApp"
source = "examples/SafeDOMExample.res"
energy-budget-mj = 10.0
carbon-budget-mg = 2.0

[[functions]]
name = "mountWithValidation"
source = "examples/SafeDOMExample.res"
energy-budget-mj = 15.0
carbon-budget-mg = 3.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
